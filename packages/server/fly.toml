# app名は Fly.io ダッシュボードで既に作成済みの "meta---geo" に合わせてある。
# デプロイはリポジトリのルートから実行します(モノレポ全体をビルドコンテキストにする必要があるため):
#   fly deploy --config packages/server/fly.toml --dockerfile packages/server/Dockerfile .

app = "meta---geo"
primary_region = "nrt" # 東京

[build]

[env]
  PORT = "4000"
  # WEB_ORIGIN と DATABASE_URL は `fly secrets set` で設定する(このファイルには書かない)

# 重要: このサーバーはマッチング待合・進行中の卓(Socket.IOルーム)を「インメモリ」で保持する。
# 複数マシンに分散すると、別マシンに接続したプレイヤー同士が同じ待合/卓に入れず、必ずBOT卓に
# なってしまう(人間同士がマッチングできない)。そのため常に単一マシンで動かす。
# (将来スケールアウトするには Socket.IO の Redis アダプタ + 共有マッチメイキングが必要。)
[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
