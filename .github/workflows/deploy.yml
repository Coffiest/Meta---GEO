name: Deploy

# このセッション(サンドボックス)からは Fly.io / Vercel / Supabase への直接アクセスが
# ネットワークポリシーでブロックされているため、実際のデプロイは GitHub Actions のランナー上
# (フル インターネットアクセスあり)で実行する。事前に以下のリポジトリシークレットの登録が必要:
#   - DATABASE_URL              Supabaseの接続文字列 (Session pooler推奨、Prisma用)
#   - FLY_API_TOKEN             Fly.ioのAPIトークン
#   - VERCEL_TOKEN              Vercelのトークン
#   - SUPABASE_URL              SupabaseプロジェクトURL (サーバー側トークン検証用)
#   - SUPABASE_SERVICE_ROLE_KEY Supabaseのservice roleキー (サーバー側トークン検証用)
#   - NEXT_PUBLIC_SUPABASE_URL       同上のプロジェクトURL (ブラウザ用、公開値)
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY  Supabaseのanon(公開)キー (ブラウザ用、公開値)
#   - STRIPE_SECRET_KEY         Stripeのシークレットキー (サーバー側、GEOサブスク決済用)
#   - STRIPE_WEBHOOK_SECRET     StripeのWebhook署名シークレット
#   - STRIPE_PRICE_ID           GEOサブスクの月額プランのPrice ID
#   - NEXT_PUBLIC_ADSENSE_CLIENT_ID      Google AdSenseの発行者ID (ca-pub-...、ブラウザ用、公開値)
#   - NEXT_PUBLIC_ADSENSE_REVIEW_SLOT_ID 棋譜解析の無料要約画面に出す広告ユニットのスロットID
# Supabase系の4つが未設定でもデプロイ自体は失敗しない(ログイン機能が自動的に無効化され、
# 従来のゲスト名入力フローにフォールバックする)。Stripe系の3つが未設定でもデプロイは失敗せず、
# サブスク機能(checkout/webhook/portal)のみ503を返して無効化される(GEO閲覧の日次無料枠は動作する)。
# AdSense系の2つが未設定でもデプロイは失敗せず、広告枠(AdSlot)自体が非表示になるだけ。
# 手動実行(Actionsタブ → Deploy → Run workflow)または main への push で動く。

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @meta-geo/db run generate
      - run: pnpm --filter @meta-geo/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # プリコンピュートした6-maxプリフロップNash(BBアンティ)を GtoSolution へ冪等投入する。
      - name: Seed GTO solutions
        run: pnpm --filter @meta-geo/db exec tsx scripts/seedGtoSolutions.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # 事前計算したSRPポストフロップ解(src/data/postflopSolutions.json)を GtoSolution へ冪等投入する。
      # バンドルはリポジトリ同梱(genPostflopSolutions.tsで生成)。未同梱ならスキップされる。
      - name: Seed GTO postflop solutions
        run: pnpm --filter @meta-geo/db exec tsx scripts/seedGtoPostflopSolutions.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-server:
    needs: migrate-db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Set Fly secrets
        run: |
          flyctl secrets set \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            WEB_ORIGIN="*" \
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            STRIPE_PRICE_ID="${{ secrets.STRIPE_PRICE_ID }}" \
            --app meta---geo
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            --config packages/server/fly.toml \
            --dockerfile packages/server/Dockerfile \
            --app meta---geo \
            --remote-only \
            .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # マッチング待合・進行中の卓をインメモリで保持するため、必ず単一マシンで動かす。
      # (複数マシンだと別マシンのプレイヤー同士が同卓できず、常にBOT卓になる。)
      - name: Pin to a single machine
        run: flyctl scale count 1 --app meta---geo --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Health check
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            if curl -sf https://meta---geo.fly.dev/health; then exit 0; fi
            echo "not up yet, retrying in 5s ($i/8)..."
            sleep 5
          done
          exit 1
      - name: Dump app logs (on failure)
        if: failure()
        run: timeout 15 flyctl logs --app meta---geo || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    needs: deploy-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: npm install --global vercel@latest
      - name: Deploy to Vercel
        # `vercel deploy` uploads only the files under the directory it's invoked from, so this
        # must run from the repo root (not apps/web) for the monorepo's install/build commands
        # (see vercel.json at the repo root) to have access to packages/engine, packages/db, the
        # workspace lockfile, etc.
        run: |
          vercel link --token "$VERCEL_TOKEN" --yes --project web

          vercel env rm NEXT_PUBLIC_SERVER_URL production --token "$VERCEL_TOKEN" --yes || true
          printf 'https://meta---geo.fly.dev' | vercel env add NEXT_PUBLIC_SERVER_URL production --token "$VERCEL_TOKEN"

          # Supabase未設定の場合は空文字を渡す(getSupabaseClient側でundefined扱いになりログイン機能が無効化される)
          vercel env rm NEXT_PUBLIC_SUPABASE_URL production --token "$VERCEL_TOKEN" --yes || true
          printf '%s' "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | vercel env add NEXT_PUBLIC_SUPABASE_URL production --token "$VERCEL_TOKEN"
          vercel env rm NEXT_PUBLIC_SUPABASE_ANON_KEY production --token "$VERCEL_TOKEN" --yes || true
          printf '%s' "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | vercel env add NEXT_PUBLIC_SUPABASE_ANON_KEY production --token "$VERCEL_TOKEN"

          # Sign in with Apple の Services ID(未設定なら空=クライアントはシート方式へフォールバック)。
          # 設定するとスタンドアロンPWAのAppleログインがリダイレクト皆無のポップアップ方式になる。
          vercel env rm NEXT_PUBLIC_APPLE_SERVICES_ID production --token "$VERCEL_TOKEN" --yes || true
          printf '%s' "${{ secrets.NEXT_PUBLIC_APPLE_SERVICES_ID }}" | vercel env add NEXT_PUBLIC_APPLE_SERVICES_ID production --token "$VERCEL_TOKEN"

          # Google AdSense未設定の場合は空文字を渡す(AdSlot側で広告枠自体が非表示になる)
          vercel env rm NEXT_PUBLIC_ADSENSE_CLIENT_ID production --token "$VERCEL_TOKEN" --yes || true
          printf '%s' "${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}" | vercel env add NEXT_PUBLIC_ADSENSE_CLIENT_ID production --token "$VERCEL_TOKEN"
          vercel env rm NEXT_PUBLIC_ADSENSE_REVIEW_SLOT_ID production --token "$VERCEL_TOKEN" --yes || true
          printf '%s' "${{ secrets.NEXT_PUBLIC_ADSENSE_REVIEW_SLOT_ID }}" | vercel env add NEXT_PUBLIC_ADSENSE_REVIEW_SLOT_ID production --token "$VERCEL_TOKEN"

          DEPLOY_URL=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN")
          echo "Deployed to: $DEPLOY_URL"
          # デプロイのたびにVercelがランダムなエイリアスを生成してURLが変わってしまうため、
          # 固定のエイリアスを明示的に貼り直して本番URLを安定させる。
          vercel alias set "$DEPLOY_URL" meta-geo-poker.vercel.app --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
